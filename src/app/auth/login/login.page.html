<!-- src/app/auth/login/login.page.html -->
<div class="login-page">
  <div class="login-card">
    <div class="user-badge">👤</div>

    <header class="card-header">
      <div class="brand-mark">
        <span class="brand-main">ACDX</span>
        <span class="brand-sub">Systems &amp; Management</span>
      </div>

      <h1>Acessar sistema</h1>
      <p>Entre com seu login e senha para continuar.</p>
    </header>

    <form class="login-form" [formGroup]="form" (ngSubmit)="submit()">
      <label class="input-group">
        <span class="input-icon">👤</span>
        <input
          type="email"
          formControlName="email"
          placeholder="Email"
          autocomplete="email"
        />
      </label>

      <small class="error" *ngIf="form.controls.email.touched && form.controls.email.invalid">
        Informe um email válido.
      </small>

      <label class="input-group">
        <span class="input-icon">🔒</span>
        <input
          [type]="showPassword() ? 'text' : 'password'"
          formControlName="password"
          placeholder="Senha"
          autocomplete="current-password"
        />
        <button
          type="button"
          class="ghost-button"
          (click)="togglePassword()">
          {{ showPassword() ? 'Ocultar' : 'Mostrar' }}
        </button>
      </label>

      <small class="error" *ngIf="form.controls.password.touched && form.controls.password.invalid">
        A senha deve ter ao menos 6 caracteres.
      </small>

      <div class="options-row">
        <button type="button" class="link-button" (click)="forgotPassword()">
          Esqueci minha senha
        </button>
      </div>

      <button class="submit-button" type="submit" [disabled]="form.invalid || loading()">
        {{ loading() ? 'Entrando...' : 'Login' }}
      </button>

      <p
        class="server-message"
        [ngClass]="{ 'success-message': !isError(), 'error-message': isError() }"
        *ngIf="serverMessage()"
      >
        {{ serverMessage() }}
      </p>
    </form>

    <div class="signup-prompt">
      <span>Não possui conta?</span>
      <a routerLink="/cadastro" class="signup-link">Criar conta</a>
    </div>
  </div>
</div>
