<div class="login-page">
  <div class="login-card">
    <header class="card-header">
      <div class="brand-mark">
        <img src="/assets/acdx_logo_transparente.png" alt="Logo ACDX" class="header-logo">
      </div>

      <h1>Acessar sistema</h1>
      <p>Entre com seu login e senha para continuar.</p>
    </header>

    <form class="login-form" [formGroup]="form" (ngSubmit)="submit()">
      <label class="input-group">
        <span class="input-icon"><img src="/assets/email_icon.png" alt="usuário"></span>
        <input type="email" formControlName="email" placeholder="Email" autocomplete="email" />
      </label>

      <small class="error" *ngIf="form.controls.email.touched && form.controls.email.invalid">
        Informe um email válido.
      </small>

      <label class="input-group">
        <span class="input-icon"><img src="/assets/key_icon.png" alt="senha"></span>
        <input [type]="showPassword() ? 'text' : 'password'" formControlName="password" placeholder="Senha"
          autocomplete="current-password" />
        <button type="button" class="ghost-button" (click)="togglePassword()">
          {{ showPassword() ? 'Ocultar' : 'Mostrar' }}
        </button>
      </label>

      <small class="error" *ngIf="form.controls.password.touched && form.controls.password.invalid">
        A senha deve ter ao menos 6 caracteres.
      </small>

      <div class="options-row">
        <button type="button" class="link-button">
          Esqueci minha senha
        </button>
      </div>

      <button class="submit-button" type="submit" [disabled]="form.invalid || loading()">
        {{ loading() ? 'Entrando...' : 'Login' }}
      </button>

      <p class="server-message" [ngClass]="{ 'success-message': !isError(), 'error-message': isError() }"
        *ngIf="serverMessage()">
        {{ serverMessage() }}
      </p>
    </form>

    <div class="signup-prompt">
      <span>Não possui conta?</span>
      <a routerLink="/cadastro" class="signup-link">Criar conta</a>
    </div>
  </div>
</div>
