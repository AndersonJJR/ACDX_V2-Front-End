<div class="signup-page">
  <div class="signup-card">
    <header class="card-header">
      <div class="brand-mark">
        <img src="/assets/acdx_logo_transparente.png" alt="Logo ACDX" class="header-logo">
      </div>

      <h1>Criar conta</h1>
      <p>Preencha os dados para cadastrar um novo usuário.</p>
    </header>

    <form class="signup-form" [formGroup]="form" (ngSubmit)="submit()">
      <label class="input-group">
        <span class="input-icon"><img src="/assets/person_icon.png" alt=""></span>
        <input type="text" formControlName="username" placeholder="Nome" autocomplete="name" />
      </label>

      <small class="error" *ngIf="form.controls.username.touched && form.controls.username.invalid">
        Informe um nome com pelo menos 3 caracteres.
      </small>

      <label class="input-group">
        <span class="input-icon"><img src="/assets/email_icon.png" alt=""></span>
        <input type="email" formControlName="email" placeholder="Email" autocomplete="email" />
      </label>

      <small class="error" *ngIf="form.controls.email.touched && form.controls.email.invalid">
        Informe um email válido.
      </small>

      <label class="input-group">
        <span class="input-icon"><img src="/assets/key_icon.png" alt=""></span>
        <input [type]="showPassword() ? 'text' : 'password'" formControlName="password" placeholder="Senha"
          autocomplete="new-password" />
        <button type="button" class="ghost-button" (click)="togglePassword()">
          {{ showPassword() ? 'Ocultar' : 'Mostrar' }}
        </button>
      </label>

      <small class="error" *ngIf="form.controls.password.touched && form.controls.password.invalid">
        A senha deve ter ao menos 6 caracteres.
      </small>

      <div class="actions-row">
        <a routerLink="/login" class="link-button">
          Já tenho conta
        </a>
      </div>

      <button class="submit-button" type="submit" [disabled]="form.invalid || loading()">
        {{ loading() ? 'Cadastrando...' : 'Cadastrar' }}
      </button>

      <p class="server-message" [ngClass]="{ 'success-message': signupSuccess(), 'error-message': !signupSuccess() }"
        *ngIf="serverMessage()">
        {{ serverMessage() }}
      </p>
    </form>
  </div>
</div>
