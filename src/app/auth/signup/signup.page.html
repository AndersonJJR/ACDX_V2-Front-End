<!-- src/app/auth/signup/signup.page.html -->
<div class="signup-page">
  <div class="signup-card">
    <div class="user-badge">👤</div>

    <header class="card-header">
      <div class="brand-mark">
        <span class="brand-main">ACDX</span>
        <span class="brand-sub">Systems &amp; Management</span>
      </div>

      <h1>Criar conta</h1>
      <p>Preencha os dados para cadastrar um novo usuário.</p>
    </header>

    <form class="signup-form" [formGroup]="form" (ngSubmit)="submit()">
      <label class="input-group">
        <span class="input-icon">👤</span>
        <input
          type="text"
          formControlName="nome"
          placeholder="Nome"
          autocomplete="name"
        />
      </label>

      <small class="error" *ngIf="form.controls.nome.touched && form.controls.nome.invalid">
        Informe um nome com pelo menos 3 caracteres.
      </small>

      <label class="input-group">
        <span class="input-icon">✉️</span>
        <input
          type="email"
          formControlName="email"
          placeholder="Email"
          autocomplete="email"
        />
      </label>

      <small class="error" *ngIf="form.controls.email.touched && form.controls.email.invalid">
        Informe um email válido.
      </small>

      <label class="input-group">
        <span class="input-icon">🔒</span>
        <input
          [type]="showPassword() ? 'text' : 'password'"
          formControlName="senha"
          placeholder="Senha"
          autocomplete="new-password"
        />
        <button
          type="button"
          class="ghost-button"
          (click)="togglePassword()">
          {{ showPassword() ? 'Ocultar' : 'Mostrar' }}
        </button>
      </label>

      <small class="error" *ngIf="form.controls.senha.touched && form.controls.senha.invalid">
        A senha deve ter ao menos 6 caracteres.
      </small>

      <div class="actions-row">
        <a routerLink="/login" class="link-button">
          Já tenho conta
        </a>
      </div>

      <button class="submit-button" type="submit" [disabled]="form.invalid || loading()">
        {{ loading() ? 'Cadastrando...' : 'Cadastrar' }}
      </button>

      <p class="server-message" *ngIf="serverMessage()">
        {{ serverMessage() }}
      </p>
    </form>
  </div>
</div>
